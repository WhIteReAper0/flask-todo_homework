{% extends 'base.html' %}

{% block title %}My Tasks{% endblock %}

{% block content %}
    <h1>My tasks</h1>

    
    <a href="{{ url_for('add') }}" 
       style="padding: 12px 20px; background: #007bff; color: white; text-decoration: none; border-radius: 6px; display: inline-block; margin-bottom: 20px;">
        + Add New Task
    </a>

    <br><br>

    {% if tasks %}
        <ul>
        {% for task in tasks %}
            <li>
                <span class="{% if task.complete %}complete{% endif %}">
                    • {{ task.title }}
                </span>
                
                <a href="{{ url_for('edit', id=task.id) }}">Edit</a>
                
                <form method="POST" 
                      action="{{ url_for('delete', task_id=task.id) }}" 
                      style="display: inline;">
                    <button type="submit" 
                            onclick="return confirm('Are you sure you want to delete this task?')">
                        Delete
                    </button>
                </form>
            </li>
        {% endfor %}
        </ul>
    {% else %}
        <p>There are no tasks yet. Add the first one!</p>
    {% endif %}
{% endblock %}
