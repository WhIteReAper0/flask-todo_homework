{% extends 'base.html' %}

{% block content %}
    <h1>New task</h1>

    <form method="POST" action="{{ url_for('add') }}">
    <p>
        <label for="title">Task name:</label><br>
        <input type="text"
               id="title"
               name="title"
               placeholder="for example: Buy cake"
               required
               autofocus
               style="width: 100%; padding: 10px; font-size: 16px;">
    </p>

    <p>
        <button type="submit" style="padding: 12px 20px; font-size: 16px;">
            + Add task
        </button>
    </p>
    </form>

    <br>
    <a href="{{ url_for('index') }}">← Back to task list</a>
{% endblock %}
